<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Пациенти</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<h2 th:text="'История за: ' + ${doctor.fullName}"></h2>

<table class="table table-striped">
    <thead>
    <tr>
        <th>Дата</th>
        <th>Пациент</th>
        <th>Диагноза</th>
        <th>Лечение</th>
        <th>Цена</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="v : ${visits}">
        <td th:text="${v.date()}"></td>
        <td th:text="${v.patientName()}"></td>
        <td th:text="${v.diagnosisName()}"></td>
        <td th:text="${v.treatment()}"></td>
        <td th:text="${v.price()}"></td>
    </tr>
    </tbody>
</table>

<a href="/web/doctors" class="btn btn-secondary mb-3">
    Назад
</a>

</body>
</html>
