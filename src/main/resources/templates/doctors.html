<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Лекари</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Списък с Лекари</h2>
        <a href="/web/home" class="btn btn-secondary">Назад</a>
    </div>

    <div class="card shadow-sm border-0 p-4 bg-white">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-primary">
            <tr>
                <th>ID</th>
                <th>Име и Фамилия</th>
                <th>УИН код</th>
                <th>Такса преглед</th>
                <th>Специалности</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="doctor : ${doctors}">
                <td th:text="${doctor.id}"></td>
                <td>
                    <a th:href="@{'/web/doctors/' + ${doctor.id} + '/visits'}"
                       th:text="${doctor.fullName}">
                    </a>
                </td>
                <td th:text="${doctor.uin}"></td>
                <td th:text="${doctor.examFee + ' лв.'}"></td>
                <td>
                    <!-- Цикъл през Set-а от специалности на доктора -->
                    <span th:each="spec : ${doctor.specialties}"
                          class="badge bg-secondary me-1"
                          th:text="${spec.name}"></span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
