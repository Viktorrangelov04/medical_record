<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Пациенти</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Регистрирани Пациенти</h2>
        <a href="/web/home" class="btn btn-secondary">Назад</a>
    </div>

    <div class="card shadow-sm border-0 p-4 bg-white">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-primary">
            <tr>
                <th>ID</th>
                <th>Име и Фамилия</th>
                <th>ЕГН (SSN)</th>
                <th>Личен Лекар</th>
                <th>Здравноосигурителен статус</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="patient : ${patients}">
                <td th:text="${patient.id}"></td>
                <td>
                    <a th:href="@{'/web/patients/' + ${patient.id} + '/visits'}"
                       th:text="${patient.fullName}">
                    </a>
                </td>
                <td th:text="${patient.ssn}"></td>
                <td th:text="${patient.doctorName}"></td>
                <td>
                    <span th:classappend="${patient.insuranceStatus.name() == 'INSURED' ? 'badge bg-success' : 'badge bg-danger'}"
                          th:text="${patient.insuranceStatus}"></span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
